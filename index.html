<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>生日驚喜小遊戲</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #f0f8ff;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        #move-btn {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            position: fixed; 
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.4s ease;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        .capoo-img {
            position: fixed;
            width: 325px; 
            pointer-events: none;
            animation: fadeOut 1.5s forwards;
            z-index: 50;
            transform: translate(-50%, -50%);
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(1.2); }
        }

        #message {
            display: none;
            text-align: center;
            font-size: 3rem;
            color: #ff4757;
            animation: celebrate 1s infinite;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <button id="move-btn">click for surprise👆</button>
    <h1 id="message">🎂🍰 Happy birthday to Zi Tong 🎂🍰</h1>

    <script>
        const btn = document.getElementById('move-btn');
        const message = document.getElementById('message');
        let count = 0;
        let currentSpeed = 0.4;

        // 原始圖片庫
        const capooImages = [
            'img/capoo1.png','img/capoo2.png','img/capoo3.png','img/capoo4.png','img/capoo5.png',
            'img/capoo6.png','img/capoo7.gif','img/capoo8.png','img/capoo9.png','img/capoo10.png',
        ];

        // ★ 用來追蹤還沒被抽到的圖片
        let availableImages = [...capooImages];

        btn.addEventListener('click', () => {
            count++;

            const rect = btn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            if (count < 5) {
                showCapoo(centerX, centerY);

                if (count === 1) {
                    btn.style.transform = 'none';
                    btn.style.left = rect.left + 'px';
                    btn.style.top = rect.top + 'px';
                }

                currentSpeed = Math.max(0.05, 0.4 - (count * 0.08)); 
                btn.style.transition = `all ${currentSpeed}s ease`;

                moveButton();
                
                const tips = [
                    "欸？跑掉了！", 
                    "變快了抓不到吧～", 
                    "吼！真的不給你點了喔！", 
                    "最後一關！加油！"
                ];
                btn.innerText = tips[count - 1];

            } else {
                btn.style.display = 'none';
                message.style.display = 'block';
                document.body.style.backgroundColor = '#fff5f5';
                
                for(let i=0; i<15; i++) {
                    setTimeout(() => {
                        showCapoo(Math.random()*window.innerWidth, Math.random()*window.innerHeight);
                    }, i*150);
                }
            }
        });

        function moveButton() {
            const padding = 150;
            const maxX = window.innerWidth - btn.offsetWidth - padding;
            const maxY = window.innerHeight - btn.offsetHeight - padding;

            const randomX = Math.floor(Math.random() * maxX) + padding/2;
            const randomY = Math.floor(Math.random() * maxY) + padding/2;

            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        // ★ 修改後的 showCapoo 函式
        function showCapoo(x, y) {
            // 如果所有圖片都抽完了，就重新重置清單（洗牌）
            if (availableImages.length === 0) {
                availableImages = [...capooImages];
            }

            // 隨機選一個索引
            const randomIndex = Math.floor(Math.random() * availableImages.length);
            
            // 從清單中「剪下」該圖片（這會改變 availableImages 的長度，達成不重複）
            const selectedImg = availableImages.splice(randomIndex, 1)[0];

            const img = document.createElement('img');
            img.src = selectedImg;
            img.className = 'capoo-img';
            img.style.left = x + 'px';
            img.style.top = y + 'px';

            document.body.appendChild(img);

            setTimeout(() => {
                img.remove();
            }, 1500);
        }
    </script>
</body>
</html>
