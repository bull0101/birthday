<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>生日驚喜小遊戲</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #f0f8ff;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        #move-btn {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            position: fixed; /* 改為定點，JS 會控制其 top/left */
            transition: all 0.2s ease;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            /* 下面兩行確保初始在螢幕正中央 */
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .capoo-img {
            position: fixed;
            width: 400px; /* ★ 這裡調大圖片尺寸，原本是 100px */
            pointer-events: none;
            animation: fadeOut 1.5s forwards;
            z-index: 50;
            transform: translate(-50%, -50%); /* 讓圖片中心對準點擊位置 */
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -200%) scale(1.5); }
        }

        #message {
            display: none;
            text-align: center;
            font-size: 3rem;
            color: #ff4757;
            animation: celebrate 1s infinite;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <button id="move-btn">點我領取禮物</button>
    <h1 id="message">🎂 生日快樂！！ 🎁</h1>

    <script>
        const btn = document.getElementById('move-btn');
        const message = document.getElementById('message');
        let count = 0;

        // 圖片路徑（如果你創了 img 資料夾，請記得改成 'img/yourfile.png'）
        const capooImages = [
            'img/capoo1.png','img/capoo2.png','img/capoo3.png','img/capoo4.png','img/capoo5.png',
        ];

        btn.addEventListener('click', () => {
            count++;

            // 取得目前按鈕的位置，用來放圖片
            const rect = btn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            if (count < 5) {
                // 1. 顯示加大後的咖波圖
                showCapoo(centerX, centerY);

                // 2. 讓按鈕跑走
                moveButton();
                
                const tips = ["欸？跑掉了！", "抓不到我～", "再一次！", "就快點到了！"];
                btn.innerText = tips[count - 1];

                // 第一次點擊後移除居中的 transform，改由 left/top 完全控制
                btn.style.transform = 'none';

            } else {
                btn.style.display = 'none';
                message.style.display = 'block';
                document.body.style.backgroundColor = '#fff5f5';
                
                for(let i=0; i<15; i++) {
                    setTimeout(() => {
                        showCapoo(Math.random()*window.innerWidth, Math.random()*window.innerHeight);
                    }, i*150);
                }
            }
        });

        function moveButton() {
            const padding = 100;
            const maxX = window.innerWidth - btn.offsetWidth - padding;
            const maxY = window.innerHeight - btn.offsetHeight - padding;

            const randomX = Math.floor(Math.random() * maxX) + padding/2;
            const randomY = Math.floor(Math.random() * maxY) + padding/2;

            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function showCapoo(x, y) {
            const img = document.createElement('img');
            img.src = capooImages[Math.floor(Math.random() * capooImages.length)];
            img.className = 'capoo-img';
            img.style.left = x + 'px';
            img.style.top = y + 'px';

            document.body.appendChild(img);

            setTimeout(() => {
                img.remove();
            }, 1500);
        }
    </script>
</body>
</html>
