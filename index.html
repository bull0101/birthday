<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>生日驚喜小遊戲</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #f0f8ff;
            font-family: "Microsoft JhengHei", sans-serif;
            /* 優化手機點擊靈敏度 */
            touch-action: manipulation;
        }

        #move-btn {
            /* ★ 加大按鈕與字體，手機上更好點擊 */
            padding: 25px 50px;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 60px;
            position: fixed; 
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            /* 初始移動速度 */
            transition: all 0.4s ease;
            z-index: 100;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .capoo-img {
            position: fixed;
            width: 325px; /* 加大的咖波圖案 */
            pointer-events: none;
            animation: fadeOut 1.5s forwards;
            z-index: 50;
            transform: translate(-50%, -50%);
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(1.2); }
        }

        #message {
            display: none;
            text-align: center;
            font-size: 3rem;
            color: #ff4757;
            animation: celebrate 1s infinite;
            padding: 20px;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <button id="move-btn">Click For Surprise👆</button>
    <h1 id="message">🎂🍰 Happy Birthday To Zi Tong 🎂🍰</h1>

    <script>
        const btn = document.getElementById('move-btn');
        const message = document.getElementById('message');
        let count = 0;
        let currentSpeed = 0.4;

        // 圖片路徑
        const capooImages = [
            'img/capoo1.png','img/capoo2.png','img/capoo3.png','img/capoo4.png','img/capoo5.png',
            'img/capoo6.png','img/capoo7.gif','img/capoo8.png','img/capoo9.png','img/capoo10.png'
        ];

        // 追蹤還沒被抽到的圖片
        let availableImages = [...capooImages];

        btn.addEventListener('click', () => {
            count++;

            const rect = btn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            if (count < 5) {
                showCapoo(centerX, centerY);

                if (count === 1) {
                    // 第一次點擊後解除居中鎖定
                    btn.style.transform = 'none';
                    btn.style.left = rect.left + 'px';
                    btn.style.top = rect.top + 'px';
                }

                // ★ 加速模式：每次點擊縮短移動時間
                currentSpeed = Math.max(0.05, 0.4 - (count * 0.08)); 
                btn.style.transition = `all ${currentSpeed}s ease`;

                moveButton();
                
                // ★ 假裝生氣的台詞與提示文字
                const tips = [
                    "欸？跑掉了！", 
                    "變快了抓不到吧～", 
                    "吼！真的不給你點了喔！", 
                    "最後一關！加油！"
                ];
                btn.innerText = tips[count - 1];

            } else {
                // 第五次點擊：成功！
                btn.style.display = 'none';
                message.style.display = 'block';
                document.body.style.backgroundColor = '#fff5f5';
                
                // 噴發 15 次隨機圖片
                for(let i=0; i<15; i++) {
                    setTimeout(() => {
                        showCapoo(Math.random()*window.innerWidth, Math.random()*window.innerHeight);
                    }, i*150);
                }
            }
        });

        function moveButton() {
            // 考慮到按鈕加大，增加安全邊距防止跑出手機螢幕外
            const padding = 180; 
            const maxX = window.innerWidth - btn.offsetWidth - (padding/2);
            const maxY = window.innerHeight - btn.offsetHeight - (padding/2);

            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));

            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function showCapoo(x, y) {
            // 洗牌邏輯：如果抽完了就重置
            if (availableImages.length === 0) {
                availableImages = [...capooImages];
            }

            const randomIndex = Math.floor(Math.random() * availableImages.length);
            const selectedImg = availableImages.splice(randomIndex, 1)[0];

            const img = document.createElement('img');
            img.src = selectedImg;
            img.className = 'capoo-img';
            img.style.left = x + 'px';
            img.style.top = y + 'px';

            document.body.appendChild(img);

            setTimeout(() => {
                img.remove();
            }, 1500);
        }
    </script>
</body>
</html>
