<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>生日驚喜小遊戲</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #f0f8ff;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        #move-btn {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            position: fixed;
            transition: all 0.2s ease;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .capoo-img {
            position: fixed;
            width: 100px; /* 視圖片大小調整 */
            pointer-events: none;
            animation: fadeOut 1.5s forwards;
            z-index: 50;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(0.5); }
            100% { opacity: 0; transform: scale(1.2) translateY(-50px); }
        }

        #message {
            display: none;
            text-align: center;
            font-size: 3rem;
            color: #ff4757;
            animation: celebrate 1s infinite;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <button id="move-btn">點我領取禮物</button>
    <h1 id="message">🎂 生日快樂！！ 🎁</h1>

    <script>
        const btn = document.getElementById('move-btn');
        const message = document.getElementById('message');
        let count = 0;

        // 這裡可以替換成你喜歡的咖波圖片 URL
        const capooImages = [
            'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKMGpxxZ2Zp1YQ0/giphy.gif', 
            'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/l41lTfOY9M1WvG8z6/giphy.gif'
        ];

        btn.addEventListener('click', () => {
            count++;

            if (count < 5) {
                // 1. 顯示咖波圖片
                showCapoo(btn.offsetLeft, btn.offsetTop);

                // 2. 讓按鈕跑走
                moveButton();
                
                // 3. 稍微改變按鈕文字增加互動感
                const tips = ["還差一點！", "抓不到我～", "加油！", "再試一次？"];
                btn.innerText = tips[count - 1];

            } else {
                // 達成 5 次點擊
                btn.style.display = 'none';
                message.style.display = 'block';
                document.body.style.backgroundColor = '#fff5f5';
                
                // 額外驚喜：灑出滿地圖案
                for(let i=0; i<20; i++) {
                    setTimeout(() => showCapoo(Math.random()*window.innerWidth, Math.random()*window.innerHeight), i*100);
                }
            }
        });

        function moveButton() {
            const padding = 50;
            const maxX = window.innerWidth - btn.offsetWidth - padding;
            const maxY = window.innerHeight - btn.offsetHeight - padding;

            const randomX = Math.floor(Math.random() * maxX) + padding/2;
            const randomY = Math.floor(Math.random() * maxY) + padding/2;

            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function showCapoo(x, y) {
            const img = document.createElement('img');
            // 隨機選一張咖波圖
            img.src = capooImages[Math.floor(Math.random() * capooImages.length)];
            img.className = 'capoo-img';
            img.style.left = x + 'px';
            img.style.top = y + 'px';

            document.body.appendChild(img);

            // 動畫結束後移除元素以免占用記憶體
            setTimeout(() => {
                img.remove();
            }, 1500);
        }

        // 初始化位置，避免一開始就在中間點不到
        window.onload = moveButton;
    </script>
</body>
</html>
