<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>生日驚喜小遊戲</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #f0f8ff;
            font-family: "Microsoft JhengHei", sans-serif;
            touch-action: manipulation;
        }

        #move-btn {
            padding: 25px 50px;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 60px;
            position: fixed; 
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.4s ease;
            z-index: 100;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .capoo-img {
            position: fixed;
            width: 325px; 
            pointer-events: none;
            animation: fadeOut 1.5s forwards;
            z-index: 50;
            transform: translate(-50%, -50%);
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(1.2); }
        }

        #message {
            display: none;
            text-align: center;
            font-size: 3rem;
            color: #ff4757;
            animation: celebrate 1s infinite;
            padding: 20px;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <button id="move-btn">Click For Surprise👆</button>
    <h1 id="message">🎂🍰 Happy Birthday To Zi Tong 🎂🍰</h1>

    <script>
        const btn = document.getElementById('move-btn');
        const message = document.getElementById('message');
        let count = 0;
        let currentSpeed = 0.4;

        const capooImages = [
            'img/capoo1.png','img/capoo2.png','img/capoo3.png','img/capoo4.png','img/capoo5.png',
            'img/capoo6.png','img/capoo7.gif','img/capoo8.png','img/capoo9.png','img/capoo10.png'
        ];

        let availableImages = [...capooImages];

        btn.addEventListener('click', () => {
            count++;

            const rect = btn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            if (count < 10) {
                showCapoo(centerX, centerY);

                if (count === 1) {
                    btn.style.transform = 'none';
                    btn.style.left = rect.left + 'px';
                    btn.style.top = rect.top + 'px';
                }

                currentSpeed = Math.max(0.05, 0.4 - (count * 0.04)); 
                btn.style.transition = `all ${currentSpeed}s ease`;

                if (count < 9) {
                    moveButton();
                } else {
                    btn.style.left = '50%';
                    btn.style.top = '50%';
                    btn.style.transform = 'translate(-50%, -50%)';
                }
                
                const tips = [
                    "咦？跑掉了！！！", 
                    "我剛才真的沒點到ㄇ？", 
                    "！！按鈕居然會亂跑嗎！！", 
                    "齁呦！！為什麼都點不到啦啦啦",
                    "太慢了～太慢了 點快一點喲～",
                    "怎麼還是點不到勒 真是的：）",
                    "好啦！不鬧你ㄌ 站在原地等你吧",
                    "嗯～該不會你真的信了吧！嘿嘿",
                    "這次真不鬧了！請公主大人點擊"
                ];
                btn.innerText = tips[count - 1];

            } else {
                btn.style.display = 'none';
                message.style.display = 'block';
                document.body.style.backgroundColor = '#fff5f5';
                
                for(let i=0; i<20; i++) {
                    setTimeout(() => {
                        showCapoo(Math.random()*window.innerWidth, Math.random()*window.innerHeight);
                    }, i*150);
                }
            }
        });

        function moveButton() {
            const padding = 180; 
            const minDistance = 250; // ★ 設定最小位移距離 (像素)
            let randomX, randomY, distance;

            // 獲取當前按鈕位置 (如果是第一次移動，以螢幕中心計算)
            const currentX = parseFloat(btn.style.left) || window.innerWidth / 2;
            const currentY = parseFloat(btn.style.top) || window.innerHeight / 2;

            do {
                const maxX = window.innerWidth - btn.offsetWidth - (padding / 2);
                const maxY = window.innerHeight - btn.offsetHeight - (padding / 2);

                randomX = Math.max(30, Math.floor(Math.random() * maxX));
                randomY = Math.max(30, Math.floor(Math.random() * maxY));

                // 計算新舊位置的距離
                const dx = randomX - currentX;
                const dy = randomY - currentY;
                distance = Math.sqrt(dx * dx + dy * dy);

            } while (distance < minDistance); // 如果距離太近，重新隨機一次

            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function showCapoo(x, y) {
            if (availableImages.length === 0) {
                availableImages = [...capooImages];
            }
            const randomIndex = Math.floor(Math.random() * availableImages.length);
            const selectedImg = availableImages.splice(randomIndex, 1)[0];

            const img = document.createElement('img');
            img.src = selectedImg;
            img.className = 'capoo-img';
            img.style.left = x + 'px';
            img.style.top = y + 'px';

            document.body.appendChild(img);

            setTimeout(() => {
                img.remove();
            }, 1500);
        }
    </script>
</body>
</html>
